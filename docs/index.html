// ============================================================================
// Step label resolver · uses operational IDs (0.1, 2A, 2A-fix, 3.1.1, etc.)
// ============================================================================

const STEP_KEYS = [
  ["0.0", "0.1"],
  ["1.0", "1.1", "1.2", "1.3", "1.4"],
  ["2A", "2A-fix", "2B", "2B-fix", "2C", "2C-rollback", "2D", "2D-fix"],
  ["3.1", "3.1.1", "3.2", "3.3", "3.4"],
  ["4.1", "4.2"],
];

function getPromptKey(pi, si) {
  return STEP_KEYS[pi]?.[si] || null;
}

function getStepLabel(pi, si) {
  return STEP_KEYS[pi]?.[si] || "·";
}

// ============================================================================
// Overview · Hero + Architecture Diagram + Highlight Cards
// ============================================================================

function SectionHeading({ label, note }) {
  return (
    <div style={{ marginBottom: 14, display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
      <div style={{ width: 14, height: 1, background: INK.vermilion, alignSelf: "center" }}/>
      <div style={{
        fontFamily: FONT.serif, fontSize: 18, fontWeight: 500,
        color: INK.ink, letterSpacing: "0.03em",
      }}>
        {label}
      </div>
      {note && (
        <div style={{
          fontFamily: FONT.mono, fontSize: 10, color: INK.inkSubtle,
          letterSpacing: "0.14em",
        }}>
          {note}
        </div>
      )}
    </div>
  );
}

function OverviewStepBox({ stepKey, label, meta, onClick }) {
  let bg = INK.paperWarm;
  let color = INK.ink;
  let borderColor = INK.inkFaint;
  let borderStyle = "solid";
  let borderWidth = 0.5;
  if (meta.hk) {
    bg = INK.ink;
    color = INK.paperWarm;
    borderColor = INK.ink;
  }
  if (meta.cond) {
    borderStyle = "dashed";
    borderColor = INK.vermilion;
    borderWidth = 1;
  }
  if (meta.opt) {
    borderStyle = "dotted";
    borderColor = INK.inkSubtle;
    borderWidth = 1;
    if (!meta.hk) color = INK.inkLight;
  }
  return (
    <button
      onClick={onClick}
      style={{
        position: "relative",
        background: bg,
        color,
        border: `${borderWidth}px ${borderStyle} ${borderColor}`,
        borderRadius: 2,
        padding: "6px 8px 7px",
        cursor: "pointer",
        textAlign: "left",
        fontFamily: FONT.sc,
        transition: "transform 0.15s ease, box-shadow 0.15s ease",
        width: "100%",
      }}
      onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-1px)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.transform = "translateY(0)"; }}
    >
      <div style={{
        fontFamily: FONT.mono, fontSize: 9,
        color: meta.hk ? INK.paperWarm : INK.inkSubtle,
        letterSpacing: "0.08em", fontWeight: 500, marginBottom: 1,
      }}>
        {stepKey}
      </div>
      <div style={{ fontSize: 11, lineHeight: 1.25, fontWeight: 500 }}>
        {label}
      </div>
      {meta.hr && (
        <div style={{
          position: "absolute", top: 4, right: 5,
          width: 5, height: 5, borderRadius: "50%", background: INK.vermilion,
        }}/>
      )}
    </button>
  );
}

function PhaseColumn({ pi, title, short, meta, onStepClick }) {
  const steps = STEP_KEYS[pi];
  return (
    <div style={{ display: "flex", flexDirection: "column", minWidth: 132, flex: 1 }}>
      <div style={{ marginBottom: 10 }}>
        <div style={{
          fontFamily: FONT.mono, fontSize: 10, color: INK.vermilion,
          letterSpacing: "0.22em", fontWeight: 600,
        }}>
          P{pi}
        </div>
        <div style={{
          fontFamily: FONT.serif, fontSize: 13, fontWeight: 500,
          color: INK.ink, letterSpacing: "0.02em", lineHeight: 1.3, marginTop: 2,
        }}>
          {title}
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {steps.map((k, si) => (
          <OverviewStepBox
            key={k}
            stepKey={k}
            label={short[k] || k}
            meta={meta[si]}
            onClick={() => onStepClick(pi, si)}

        ))}
      </div>
    </div>
  );
}

      }}>

function ArchitectureDiagram({ lang, onStepClick }) {
  const t = T[lang];
  const nodes = [];
  for (let pi = 0; pi < STEP_KEYS.length; pi++) {
    if (pi === 3) {
      nodes.push(<LockDivider key="lock" label={t.ideaLockLabel} />);
    } else if (pi > 0) {
      nodes.push(<ArrowConnector key={`a${pi}`} />);
    }
    nodes.push(
      <PhaseColumn
        key={`p${pi}`}
        pi={pi}
        title={t.phases[pi].title}
        short={t.archStepShort}
        meta={STEP_META[pi]}
        onStepClick={onStepClick}
      />
    );
  }
  return (
    <div style={{
      display: "flex", gap: 0, alignItems: "stretch",
      overflowX: "auto", padding: "4px 2px 18px",
      marginBottom: 10,
    }}>
      {nodes}
    </div>
  );
}

function ArchLegend({ legend }) {
  const items = [
    { k: "mainFlow" },
    { k: "humanOnly" },
    { k: "hardRule" },
    { k: "conditional" },
    { k: "optional" },
    { k: "lockPoint" },
  ];
  const swatch = (k) => {
    if (k === "mainFlow") return <div style={{ width: 16, height: 10, background: INK.paperWarm, border: `0.5px solid ${INK.inkFaint}`, borderRadius: 1.5 }}/>;
    if (k === "humanOnly") return <div style={{ width: 16, height: 10, background: INK.ink, borderRadius: 1.5 }}/>;
    if (k === "hardRule") return (
      <div style={{ width: 16, height: 10, background: INK.paperWarm, border: `0.5px solid ${INK.inkFaint}`, borderRadius: 1.5, position: "relative" }}>
        <div style={{ position: "absolute", top: 1, right: 1, width: 3, height: 3, borderRadius: "50%", background: INK.vermilion }}/>
      </div>
    );
    if (k === "conditional") return <div style={{ width: 16, height: 10, background: "transparent", border: `1px dashed ${INK.vermilion}`, borderRadius: 1.5 }}/>;
    if (k === "optional") return <div style={{ width: 16, height: 10, background: "transparent", border: `1px dotted ${INK.inkSubtle}`, borderRadius: 1.5 }}/>;
    if (k === "lockPoint") return (
      <div style={{ width: 16, height: 10, display: "flex", justifyContent: "center", alignItems: "center" }}>
        <div style={{ width: 1, height: 10, background: INK.vermilion, opacity: 0.7 }}/>
      </div>
    );
    return null;
  };
  return (
    <div style={{
      display: "flex", flexWrap: "wrap", gap: "8px 18px",
      marginBottom: 22, paddingLeft: 2,
    }}>
      {items.map((it) => (
        <div key={it.k} style={{ display: "flex", alignItems: "center", gap: 7 }}>
          {swatch(it.k)}
          <div style={{
            fontFamily: FONT.sc, fontSize: 10.5, color: INK.inkMed,
            letterSpacing: "0.02em",
          }}>
            {legend[it.k]}
          </div>
        </div>
      ))}
    </div>
  );
}

function HighlightCards({ highlights }) {

      display: "grid",
      gridTemplateColumns: "repeat(5, minmax(0, 1fr))",
      gap: 10,
      marginBottom: 4,
    }}>
      {highlights.map((h, i) => (
        <div key={i} style={{
          background: INK.paperWarm,
          border: `0.5px solid ${INK.inkFaint}`,
          borderRadius: 2,
          padding: "14px 13px 14px",
          display: "flex",
          flexDirection: "column",
          position: "relative",
        }}>
          <div style={{
            fontFamily: FONT.mono, fontSize: 9, color: INK.vermilion,
            letterSpacing: "0.14em", fontWeight: 600,
            textTransform: "uppercase", marginBottom: 8,
            lineHeight: 1.3,
          }}>
            {h.tag}
          </div>
          <div style={{
            fontFamily: FONT.sc, fontSize: 14, fontWeight: 600, color: INK.ink,
            lineHeight: 1.35, letterSpacing: "0.01em", marginBottom: 10,
          }}>
            {h.title}
          </div>
          <div style={{
            fontFamily: FONT.sc, fontSize: 11, fontWeight: 400,
            color: INK.inkMed, lineHeight: 1.55, marginBottom: 10,

          <div style={{

function OverviewView({ lang, setView, setTab, setAp }) {
  const t = T[lang];
  const handleStepClick = (pi) => {
    setView("detail");
    setTab("workflow");
    setAp(pi);
  };
  return (
    <div style={{ padding: "22px 24px 60px" }}>
      {/* Hero definition block */}
      <div style={{ textAlign: "center", maxWidth: 720, margin: "4px auto 34px" }}>
        <div style={{
          fontFamily: FONT.sc, fontSize: 19, fontWeight: 500,
          lineHeight: 1.45, color: INK.ink, letterSpacing: "0.02em",
        }}>
          {t.heroDef}
        </div>
        <div style={{
          marginTop: 10, fontFamily: FONT.mono, fontSize: 10,
          color: INK.inkSubtle, letterSpacing: "0.22em", textTransform: "uppercase",
        }}>
          {t.heroStageNote}
        </div>
      </div>

      {/* Architecture diagram */}
      <SectionHeading label={t.archTitle} note={t.archNote} />
      <ArchitectureDiagram lang={lang} onStepClick={handleStepClick} />
      <ArchLegend legend={t.archLegend} />

      {/* Highlights */}
      <div style={{ height: 14 }}/>
      <SectionHeading label={t.highlightsTitle} note={null} />
      <HighlightCards highlights={t.highlights} />

      {/* Enter detail button */}
      <div style={{ textAlign: "center", marginTop: 36 }}>
        <button
          onClick={() => { setView("detail"); setTab("workflow"); }}
          style={{
            background: INK.ink,
            color: INK.paperWarm,
            border: "none",
            padding: "11px 26px",
            fontFamily: FONT.serif,
            fontStyle: "italic",
            fontSize: 14,
            letterSpacing: "0.04em",
            cursor: "pointer",
            borderRadius: 2,
          }}
        >
          {t.enterDetailBtn}
        </button>
      </div>
    </div>
  );
}

// App

  const t = T[lang];

  useEffect(() => {
    const link = document.createElement("link");

    link.rel = "stylesheet";
    document.head.appendChild(link);
    return () => {
      try { document.head.removeChild(link); } catch {}

        <button
          onClick={() => setLang(lang === "en" ? "zh" : "en")}
          style={{
            position: "absolute",
            top: 22,
            right: 20,
            width: 30,
            height: 30,
            background: INK.vermilion,
            border: "none",
            color: INK.paperWarm,
            fontFamily: FONT.sc,
            fontWeight: 500,
            fontSize: 12,

            transition: "transform 0.3s",

        >
          {lang === "en" ? "中" : "EN"}
        </button>

        {view === "detail" && (
          <button
            onClick={() => setView("overview")}
            style={{
              position: "absolute",
              top: 28,
              left: 20,
              background: "transparent",
              border: "none",
              fontFamily: FONT.serif,
              fontStyle: "italic",
              fontSize: 13,
              color: INK.inkMed,
              letterSpacing: "0.02em",
              cursor: "pointer",
              padding: "4px 6px",
              zIndex: 2,
              transition: "color 0.2s, transform 0.2s",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.color = INK.ink; e.currentTarget.style.transform = "translateX(-2px)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.color = INK.inkMed; e.currentTarget.style.transform = "translateX(0)"; }}
          >
            {t.returnToOverview}
          </button>
        )}

        <div style={{
          display: "flex",
          justifyContent: "center",
          margin: "6px auto 14px",
          width: 110,
          height: 110,
        }}>
          <TaijiHero />
        </div>

        <div style={{ textAlign: "center" }}>
          <h1 style={{
            fontFamily: FONT.serif,
            fontSize: 34,
            fontWeight: 400,
            letterSpacing: "0.04em",

                    borderRadius: 2,
