function getPromptKey(pi, si) {
  const keys = [
    ["0-1", "0-2"],
    ["1-0", "1-1", "1-2", "1-3", null],
    ["2-0", "2-1", "2-2", "2-3"],
    ["3-0", "3-1", null, null, null],
    [null, "4-1"],
  ];
  return keys[pi]?.[si] || null;
}

          <button
            key={tb.k}
            onClick={() => setTab(tb.k)}
            style={{
              fontFamily: FONT.serif,
              fontSize: 17,
              color: tab === tb.k ? INK.ink : INK.inkSubtle,
              background: "transparent",
              border: "none",
              cursor: "pointer",
              padding: "6px 0 14px",
              position: "relative",
              letterSpacing: "0.04em",
              fontWeight: 500,
              transition: "color 0.3s",
            }}
          >
            {tb.l}
            {tab === tb.k && <WavyUnderline />}
          </button>
        ))}
      </div>

      {/* Phase Nav */}
      {tab === "workflow" && (
        <div style={{
          padding: "18px 40px 12px",
          position: "relative",
          flexShrink: 0,
          zIndex: 1,
        }}>
          {/* Track line */}
          <div style={{
            position: "absolute",
            top: 33,
            left: 60,
            right: 60,
            height: 0.5,
            background: INK.inkLight,
            opacity: 0.2,
            zIndex: 0,
          }}/>
          <div style={{
            display: "flex",
            justifyContent: "space-between",
            position: "relative",
            zIndex: 1,
          }}>
            {t.phases.map((ph, i) => (
              <button
                key={i}
                onClick={() => setAp(i)}
                style={{
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  gap: 8,
                  background: "transparent",
                  border: "none",
                  padding: 0,
                  cursor: "pointer",
                  flex: 1,
                }}
              >
                <div style={{ width: 26, height: 26 }}>
                  <InkDot active={ap === i} />
                </div>
                <div style={{
                  fontFamily: FONT.mono,
                  fontSize: 10,
                  color: ap === i ? INK.ink : INK.inkSubtle,
                  letterSpacing: "0.15em",
                  fontWeight: 500,
                  transition: "color 0.3s",
                }}>
                  P{i}
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Content */}
      <div ref={ref} style={{ flex: 1, overflow: "auto", zIndex: 1, position: "relative" }}>
        {tab === "family" ? (
          <FamilyView lang={lang} />
        ) : (
          <div style={{ padding: "18px 28px 60px" }}>
            {/* Phase header */}
            <div style={{
              marginBottom: 22,
              display: "flex",
              alignItems: "baseline",
              gap: 14,
            }}>
              <div style={{
                fontFamily: FONT.serif,
                fontSize: 48,
                fontWeight: 300,
                fontStyle: "italic",
                color: INK.inkFaint,
                lineHeight: 1,
                letterSpacing: "-0.02em",
                flexShrink: 0,
              }}>
                {ROMAN[ap]}
              </div>
              <div>
                <div style={{
                  fontFamily: FONT.serif,
                  fontSize: 24,
                  fontWeight: 500,
                  color: INK.ink,
                  letterSpacing: "0.01em",
                  lineHeight: 1.15,
                }}>
                  {phase.title}
                </div>
                <div style={{
                  fontFamily: FONT.mono,
                  fontSize: 10,
                  color: INK.vermilion,
                  letterSpacing: "0.2em",
                  textTransform: "uppercase",
                  marginTop: 3,
                  fontWeight: 500,
                }}>
                  Phase {String(ap).padStart(2, "0")}
                </div>
              </div>
            </div>

            {/* Steps */}
            {phase.steps.map((s, si) => (
              <StepCard
                key={`${ap}-${si}`}
                step={s}
                meta={STEP_META[ap][si]}
                promptKey={getPromptKey(ap, si)}
                lang={lang}
                index={si}
                roleTable={ap === 1 && si === 0 ? (lang === "en" ? ROLE_TABLE : ROLE_TABLE_ZH) : null}
              />
            ))}

            {/* Phase navigation */}
            <div style={{
              display: "flex",
              justifyContent: "space-between",
              marginTop: 24,
              gap: 10,
            }}>
              {ap > 0 && (
                <button
                  onClick={() => setAp(ap - 1)}
                  style={{
                    flex: 1,
                    padding: "10px 12px",
                    background: "transparent",
                    border: `0.5px solid ${INK.inkFaint}`,
                    borderRadius: 2,
                    fontFamily: FONT.serif,
                    fontStyle: "italic",
                    fontSize: 13,
                    color: INK.inkMed,
                    cursor: "pointer",
                    letterSpacing: "0.02em",
                  }}
                >
                  ← Phase {String(ap - 1).padStart(2, "0")}
                </button>
              )}
              {ap < t.phases.length - 1 && (
                <button
                  onClick={() => setAp(ap + 1)}
                  style={{
                    flex: 1,
                    padding: "10px 12px",
                    background: INK.ink,
                    border: "none",
                    borderRadius: 2,
                    fontFamily: FONT.serif,
                    fontStyle: "italic",
                    fontSize: 13,
                    color: INK.paperWarm,
                    cursor: "pointer",
                    letterSpacing: "0.02em",
                  }}
                >
                  Phase {String(ap + 1).padStart(2, "0")} →
                </button>
              )}
            </div>

            {/* Footer colophon — only on last phase */}
            {ap === t.phases.length - 1 && (
              <div style={{
                marginTop: 40,
                padding: "24px 0 0",
                textAlign: "center",
              }}>
                <div style={{
                  width: 48,
                  height: 0.5,
                  background: INK.inkLight,
                  margin: "0 auto 18px",
                  opacity: 0.4,
                }}/>
                <div style={{
                  fontFamily: FONT.sc,
                  fontSize: 14,
                  color: INK.inkMed,
                  letterSpacing: "0.08em",
                  marginBottom: 4,
                }}>
                  太极生两仪，两仪生四象
                </div>
                <div style={{
                  fontFamily: FONT.serif,
                  fontStyle: "italic",
                  fontSize: 12,
                  color: INK.inkLight,
                  letterSpacing: "0.02em",
                }}>
                  From one, two. From two, four.
                </div>
                <div style={{
                  marginTop: 14,
                  fontFamily: FONT.mono,
                  fontSize: 9,
                  color: INK.inkSubtle,
                  letterSpacing: "0.25em",
                  textTransform: "uppercase",
                }}>
                  Liangyi · v1.0
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
